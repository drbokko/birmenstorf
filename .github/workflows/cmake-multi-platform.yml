# CI matches README "Build": submodule init, then cmake -B … -S … and build.
# Linux: libzmq (README), pkg-config for CMake PkgConfig, optional OpenCV/LibTIFF
# extras so normalize_images / inpaint_tiff / bundled libtiff configure cleanly.
# Windows: BUILD_LIBZMQ=ON builds ZeroMQ from source (README / data_consumer CMake).
name: CMake on multiple platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            configure_extra: ""
          - os: ubuntu-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            configure_extra: ""
          - os: windows-latest
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl
            configure_extra: "-DBUILD_LIBZMQ=ON"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libzmq3-dev \
            libcurl4-openssl-dev \
            libopencv-dev \
            zlib1g-dev \
            libjpeg-dev \
            liblzma-dev

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          ${{ matrix.configure_extra }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
